name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build (all binaries)
        run: |
          go build -trimpath ./cmd/server
          go build -trimpath ./cmd/puzzle-build
          go build -trimpath ./cmd/bot-candidates
          go build -trimpath ./cmd/og-render
          go build -trimpath ./cmd/admin
