{{ template "base.html" . }}

{{ define "title" }}Sign-in link{{ end }}

{{ define "header-meta" }}
  <a href="/" class="nav-link">← today</a>
{{ end }}

{{ define "content" }}
  <div class="stage">
    <div class="result">
      <div class="page-mark">🪿</div>
      <h2>{{ .Headline }}</h2>
      <div class="verdict">{{ .Body }}</div>
      <div class="controls" style="margin-top:18px;">
        <a class="btn btn-primary" href="/me" style="text-align:center;text-decoration:none;display:block;">Back to your decoys ▸</a>
      </div>
    </div>
  </div>
{{ end }}
