{{ define "base.html" }}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>{{ block "title" . }}Bot Bot Goose{{ end }}</title>
<meta name="description" content="A daily game where you spot the AI hiding among real humans." />
<!-- Tells iOS Safari (and Chrome) to paint its UI bars + the home-indicator
     safe area with the brand's pond-deep color, not the browser default. -->
<meta name="theme-color" content="#0e1a20" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="{{ asset "/static/icons/goose.svg" }}" type="image/svg+xml" />
<link rel="stylesheet" href="{{ asset "/static/css/app.css" }}" />
{{ block "head" . }}{{ end }}
<meta property="og:type" content="website" />
{{ block "og" . }}
<meta property="og:title" content="Bot Bot Goose" />
<meta property="og:description" content="One bot. Three humans. Tap the goose." />
{{ end }}
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="mark">🪿</span>
      <h1>Bot Bot <span>Goose</span></h1>
    </div>
    <div class="meta">
      {{ block "header-meta" . }}{{ end }}
    </div>
  </header>

  {{ block "content" . }}{{ end }}

  <footer>
    <small>a bot hides among the humans</small>
    <a class="footer-link" href="/privacy">privacy</a>
  </footer>
</div>
<div class="toast" id="toast"></div>
{{ block "scripts" . }}{{ end }}
</body>
</html>
{{ end }}
